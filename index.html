lidité financière du protocole. Limite : comme pour beaucoup de tokens de gouvernance DeFi, la question de la redistribution effective des revenus du protocole vers les détenteurs de token (au-delà du strict rôle de sécurité et de vote) reste débattue au sein de la communauté."}], "casEtude": {"titre": "Audit comparatif express : Bitcoin, Ethereum, Solana, Aave", "texte": ["En appliquant la grille en cinq questions : les quatre projets résolvent un problème d'incitation identifiable (sécuriser un réseau de paiement, financer l'exécution de smart contracts, sécuriser un réseau haute performance, capitaliser un filet de sécurité pour un protocole de prêt).", "Sur la soutenabilité de l'émission, Bitcoin et Ethereum (post-fusion, avec le burn EIP-1559) apparaissent comme les modèles les plus éprouvés sur la durée ; Solana et Aave nécessitent une analyse plus fine et actualisée de leurs paramètres d'émission courants, qui évoluent plus fréquemment.", "Sur la distribution, Bitcoin se distingue par l'absence totale de pré-mine ou d'allocation à une équipe fondatrice identifiée — un cas unique dans l'industrie — tandis qu'Ethereum, Solana et Aave ont chacun réalisé des levées de fonds avec allocation à une équipe et des investisseurs, un modèle devenu la norme pour tout projet lancé après 2017.", "La conclusion méthodologique : aucun de ces quatre projets n'est « meilleur » dans l'absolu — chacun optimise pour un objectif différent (réserve de valeur pure, plateforme d'exécution généraliste, performance transactionnelle, sécurité d'un protocole de prêt), et la grille d'analyse sert justement à rendre ces arbitrages explicites plutôt qu'implicites."]}, "exercice": {"consigne": "Choisissez un projet blockchain de votre choix (autre que ceux étudiés dans ce chapitre) et réalisez un audit complet en suivant la grille en cinq questions :", "etapes": ["Répondez précisément aux cinq questions de la grille, en citant vos sources (documentation officielle, tableau de bord on-chain, articles d'analystes reconnus).", "Rédigez une synthèse SWOT (forces, faiblesses, opportunités, menaces) de la tokenomics de ce projet en 4 à 6 lignes par catégorie.", "Concluez par une recommandation d'une phrase : ce projet a-t-il, selon vous, une tokenomics soutenable sur 3 à 5 ans ?"]}, "cles": ["Une grille de cinq questions structure tout audit de tokenomics : problème résolu, soutenabilité de l'émission, distribution, calendrier de vesting, calibrage de la gouvernance/récompenses.", "Bitcoin optimise pour la prévisibilité et la sécurité ; Ethereum pour la flexibilité applicative ; Solana pour la performance ; Aave pour la sécurité d'un protocole de prêt.", "Aucune tokenomics n'est universellement supérieure : chacune reflète un arbitrage assumé entre plusieurs objectifs souvent contradictoires.", "L'analyse comparative doit toujours s'appuyer sur des données vérifiables et à jour plutôt que sur la seule réputation d'un projet."], "quiz": [{"q": "Parmi les cinq questions de la grille d'audit du chapitre, laquelle porte sur la distribution ?", "options": ["Quel problème d'incitation le token résout-il ?", "Comment le token est-il distribué entre insiders et communauté ?", "Le projet a-t-il un site web attractif ?", "Qui est le fondateur du projet ?"], "correct": 1, "explain": "La troisième question de la grille porte précisément sur la distribution du token et la proportion contrôlée par les insiders par rapport à la communauté."}, {"q": "Quelle est une limite structurelle de Bitcoin évoquée dans ce chapitre ?", "options": ["Une offre imprévisible et changeante", "L'absence quasi totale de flexibilité protocolaire", "Une inflation non maîtrisée", "Une gouvernance trop rapide et instable"], "correct": 1, "explain": "Toute évolution du protocole Bitcoin exige un consensus si large qu'elle prend souvent plusieurs années, freinant l'innovation directement sur la couche de base."}, {"q": "Le token AAVE sert notamment de...", "options": ["Mécanisme de sécurité via le Safety Module", "Stablecoin adossé à des réserves en cash", "NFT de collection unique", "Token soulbound non transférable"], "correct": 0, "explain": "Les détenteurs qui stakent leurs AAVE agissent comme filet de sécurité en cas de déficit du protocole, en échange d'une rémunération."}]}, {"n": 11, "title": "Tokenomics de Jeux Web3", "objectifs": ["Comprendre le modèle play-to-earn et le principe du double token (gouvernance + utilité in-game).", "Analyser les causes économiques structurelles de la chute d'Axie Infinity.", "Identifier les principes de conception qui rendent une économie de jeu Web3 plus durable."], "cours": [{"type": "h3", "text": "Le modèle play-to-earn : une promesse séduisante, un défi économique majeur"}, {"type": "p", "text": "Le play-to-earn (« jouer pour gagner ») propose aux joueurs de recevoir une rémunération réelle, sous forme de tokens négociables, en échange de leur temps de jeu. Ce modèle a connu un essor spectaculaire en 2021, particulièrement dans des pays où le revenu tiré du jeu représentait une part significative du revenu quotidien de certains joueurs. Le défi économique est structurel : contrairement à un jeu traditionnel où l'éditeur vend un produit fini, un jeu play-to-earn doit générer un flux de valeur suffisant (par de nouveaux joueurs entrants, des achats in-game, ou une demande spéculative externe) pour financer les récompenses versées aux joueurs existants — un mécanisme qui ressemble structurellement à un système où l'entrée de nouveaux participants finance la sortie des participants existants."}, {"type": "h3", "text": "Le modèle à double token"}, {"type": "p", "text": "La plupart des jeux Web3 séparent leur économie en deux tokens distincts : un token de gouvernance à offre limitée, destiné à la détention long terme et aux décisions stratégiques du jeu, et un token utilitaire in-game, à offre non plafonnée, utilisé pour les récompenses quotidiennes, l'élevage ou la fabrication d'objets, et généralement soumis à une pression inflationniste bien plus forte. Cette séparation vise à protéger la valeur du token de gouvernance des effets inflationnistes nécessaires au bon fonctionnement quotidien de l'économie in-game — mais elle ne fonctionne que si les mécanismes de destruction (sinks) du token utilitaire sont suffisamment puissants pour absorber son émission constante."}, {"type": "h3", "text": "L'économie NFT dans les jeux Web3"}, {"type": "p", "text": "Les personnages, terrains ou objets du jeu sont souvent représentés par des NFT, dont la possession est nécessaire pour participer à certaines activités générant des récompenses. Cela crée une double dynamique de marché : un marché primaire (vente initiale des NFT par l'éditeur, qui capture une part de la valeur immédiatement) et un marché secondaire (revente entre joueurs), sur lequel l'éditeur peut prélever une redevance (royalty). Le prix d'entrée de ces NFT, souvent élevé lors du lancement, constitue une barrière à l'entrée qui peut ralentir l'afflux de nouveaux joueurs nécessaires à la soutenabilité du modèle."}, {"type": "h3", "text": "La gestion de l'inflation : le nerf de la guerre"}, {"type": "p", "text": "Le facteur déterminant de la durabilité d'une économie de jeu Web3 est l'équilibre entre les « faucets » (sources d'émission de tokens : récompenses de jeu, quêtes complétées) et les « sinks » (destinations qui retirent des tokens de la circulation : frais de fabrication, upgrade d'objets, frais de reproduction de personnages, taxes de transaction). Un jeu sain maintient un équilibre où les sinks absorbent une part substantielle des faucets ; un jeu en difficulté voit ses faucets croître avec l'afflux de nouveaux joueurs sans que les sinks suivent au même rythme, provoquant une chute continue du prix du token utilitaire à mesure que l'offre croît plus vite que la demande de destruction."}, {"type": "h3", "text": "Principes de conception pour une économie plus durable"}, {"type": "p", "text": "Les leçons tirées des échecs passés convergent vers quelques principes : plafonner strictement l'émission quotidienne de récompenses par joueur plutôt que de la laisser croître librement avec le nombre de joueurs ; introduire des sinks obligatoires et significatifs (et pas seulement optionnels) dans le gameplay ; diversifier les sources de revenus au-delà de la seule vente de NFT initiale (abonnements, cosmétiques, publicité) pour réduire la dépendance à un afflux permanent de nouveaux capitaux ; et enfin, être transparent sur le fait qu'un jeu play-to-earn reste un système économique complexe, pas une garantie de revenu passif."}], "casEtude": {"titre": "Axie Infinity : l'ascension et la chute d'un modèle à double token", "texte": ["Axie Infinity, lancé par le studio vietnamien Sky Mavis, a connu une croissance fulgurante en 2021, portée par son modèle play-to-earn où les joueurs élevaient et faisaient combattre des créatures NFT appelées Axies pour gagner du token utilitaire SLP (Smooth Love Potion), échangeable contre de vraies devises.", "Le mécanisme de faucet (récompenses SLP pour chaque combat gagné et chaque quête quotidienne complétée) a crû proportionnellement à l'afflux massif de nouveaux joueurs, tandis que le principal sink (la reproduction de nouveaux Axies, qui consommait du SLP) n'a pas suffi à absorber cette émission croissante, en partie parce que de nombreux joueurs préféraient revendre directement leur SLP plutôt que de le réinvestir dans la reproduction.", "Le résultat a été une chute de plus de 99 % du prix du SLP entre son pic de juillet 2021 et la fin de l'année 2021, rendant le modèle économiquement non viable pour de nombreux joueurs dont le revenu dépendait de cette rémunération — un cas devenu la référence pédagogique de l'industrie sur les dangers d'un déséquilibre faucet/sink non corrigé à temps.", "Sky Mavis a depuis tenté plusieurs corrections (réduction des récompenses, nouveaux sinks, refonte du jeu), illustrant qu'un déséquilibre économique peut parfois être corrigé, mais au prix d'une perte de confiance difficile à regagner auprès des joueurs déjà présents."]}, "exercice": {"consigne": "En vous appuyant sur le cas Axie Infinity, proposez une refonte de son économie SLP qui aurait pu limiter l'effondrement observé :", "etapes": ["Proposez au moins deux nouveaux sinks concrets qui auraient pu absorber davantage de SLP en circulation (au-delà de la seule reproduction d'Axies).", "Proposez un mécanisme de plafonnement de l'émission quotidienne de SLP par joueur, avec une justification chiffrée simple.", "Expliquez en 4-5 phrases comment vous communiqueriez ce changement à une communauté de joueurs déjà habituée à des récompenses plus généreuses, sans provoquer une fuite massive de joueurs."]}, "cles": ["Le play-to-earn doit générer un flux de valeur suffisant pour financer les récompenses versées, sous peine de dépendre structurellement de l'afflux de nouveaux joueurs.", "Le modèle à double token sépare gouvernance (offre limitée) et utilité in-game (offre non plafonnée, forte pression inflationniste).", "L'équilibre entre faucets (émission) et sinks (destruction) est le facteur déterminant de la durabilité d'une économie de jeu Web3.", "Axie Infinity illustre concrètement les conséquences d'un déséquilibre faucet/sink non corrigé à temps : une chute de plus de 99 % du token utilitaire SLP."], "quiz": [{"q": "Le modèle à double token dans les jeux Web3 sépare généralement...", "options": ["Deux tokens de gouvernance identiques", "Un token de gouvernance à offre limitée et un token utilitaire in-game à offre non plafonnée", "Deux stablecoins adossés au dollar", "Un NFT et un security token"], "correct": 1, "explain": "Cette séparation vise à protéger la valeur du token de gouvernance des effets inflationnistes nécessaires au fonctionnement quotidien de l'économie in-game."}, {"q": "L'équilibre entre « faucets » et « sinks » mesure...", "options": ["La vitesse de traitement de la blockchain", "L'équilibre entre l'émission et la destruction de tokens dans l'économie du jeu", "Le nombre total de joueurs inscrits", "Le prix du Bitcoin sur le marché"], "correct": 1, "explain": "Un jeu sain maintient un équilibre où les sinks (destruction) absorbent une part substantielle des faucets (émission de récompenses)."}, {"q": "De combien le prix du token SLP d'Axie Infinity a-t-il chuté entre juillet et fin 2021 ?", "options": ["Environ 10 %", "Environ 50 %", "Plus de 99 %", "Il n'a pas baissé"], "correct": 2, "explain": "Le déséquilibre entre faucets et sinks a provoqué une chute de plus de 99 % du prix du SLP, un cas devenu une référence pédagogique de l'industrie."}]}, {"n": 12, "title": "Tokenomics DeFi", "objectifs": ["Comprendre les mécanismes de génération de revenus d'un protocole DeFi.", "Distinguer la Total Value Locked (TVL) d'une véritable capture de valeur par le token.", "Analyser le débat du « fee switch » à travers les cas Aave et Uniswap."], "cours": [{"type": "h3", "text": "D'où vient le revenu d'un protocole DeFi ?"}, {"type": "p", "text": "Un protocole de finance décentralisée génère généralement son revenu par des frais prélevés sur son activité : frais de swap sur un exchange décentralisé, écart entre taux d'emprunt et taux de dépôt sur un protocole de prêt, frais de liquidation en cas de position sous-collatéralisée. Ce revenu est réel — il provient d'une activité économique effective — mais la question centrale de la tokenomics DeFi est de savoir si, et comment, ce revenu profite aux détenteurs du token de gouvernance du protocole, plutôt qu'uniquement aux fournisseurs de liquidité ou à la trésorerie du protocole."}, {"type": "h3", "text": "TVL : un indicateur d'activité, pas de valeur captée"}, {"type": "p", "text": "La Total Value Locked (valeur totale verrouillée) mesure le montant total d'actifs déposés dans les smart contracts d'un protocole — un indicateur de taille et de confiance, largement suivi par la communauté. Une TVL élevée est un signal positif d'adoption, mais elle ne dit absolument rien, en elle-même, sur la capacité du token de gouvernance à capter une part de la valeur générée par cette activité. Un protocole peut afficher une TVL de plusieurs milliards de dollars tout en distribuant l'intégralité de ses revenus aux fournisseurs de liquidité, sans qu'aucun flux ne profite directement aux détenteurs du token de gouvernance — une distinction que beaucoup d'investisseurs débutants ignorent en confondant TVL et valorisation justifiée du token."}, {"type": "h3", "text": "Le fee switch : activer ou non le partage des revenus"}, {"type": "p", "text": "Un « fee switch » désigne un mécanisme, généralement déjà présent dans le code du protocole mais désactivé par défaut, qui permettrait de rediriger une partie des frais générés par le protocole vers les détenteurs du token de gouvernance (par exemple via une distribution proportionnelle ou un mécanisme de buyback-and-burn). L'activation d'un fee switch est souvent un sujet de vote de gouvernance hautement disputé : elle bénéficie directement aux détenteurs de token, mais peut aussi réduire l'attractivité du protocole pour les fournisseurs de liquidité (dont la rémunération pourrait diminuer) ou soulever des questions de conformité réglementaire, un protocole distribuant des revenus à ses détenteurs de token ressemblant alors davantage à une entreprise distribuant des dividendes."}, {"type": "h3", "text": "Buyback-and-burn : une alternative à la distribution directe"}, {"type": "p", "text": "Plutôt que de distribuer directement les revenus aux détenteurs, certains protocoles utilisent une partie de leurs revenus pour racheter leur propre token sur le marché ouvert, puis le détruire (burn) — un mécanisme qui réduit l'offre en circulation sans distribuer directement un revenu identifiable à chaque détenteur, ce qui peut présenter des avantages sur le plan réglementaire tout en bénéficiant indirectement à tous les détenteurs via la réduction de l'offre totale."}, {"type": "h3", "text": "Vers une DeFi qui capture réellement de la valeur pour son token"}, {"type": "p", "text": "La maturation du secteur DeFi, après plusieurs cycles où les tokens de gouvernance ont souvent sous-performé la croissance réelle des protocoles qu'ils représentaient, pousse une part croissante de l'industrie vers des mécanismes de capture de valeur plus explicites et directs (fee switch actif, buyback-and-burn systématique) plutôt que vers la seule promesse théorique d'un droit de vote sans lien direct avec les revenus générés."}], "casEtude": {"titre": "Aave et Uniswap : deux réponses différentes à la question de la capture de valeur", "texte": ["Aave a mis en place un Safety Module dans lequel les détenteurs qui stakent leur token AAVE reçoivent une rémunération directe en échange du risque qu'ils acceptent de couvrir en cas de déficit du protocole — un mécanisme de capture de valeur clair et directement lié à un service rendu (la sécurité financière du protocole).", "Uniswap, malgré une TVL et un volume de transactions parmi les plus élevés de toute la DeFi, a longtemps laissé son fee switch désactivé : les frais de swap sont intégralement redistribués aux fournisseurs de liquidité, sans qu'aucune part ne bénéficie directement aux détenteurs du token UNI au-delà de leur seul droit de vote.", "Ce contraste illustre concrètement pourquoi deux protocoles avec une activité économique comparable en apparence peuvent justifier des approches de valorisation très différentes de leur token : la question à se poser n'est jamais seulement « combien d'activité ce protocole génère-t-il ? » mais « quelle part de cette activité, précisément, revient au détenteur du token que j'envisage d'acheter ? »"]}, "exercice": {"consigne": "Choisissez un protocole DeFi réel (prêt, exchange décentralisé, ou dérivés) et modélisez sa capture de valeur pour son token :", "etapes": ["Relevez le revenu total généré par le protocole sur les 12 derniers mois (souvent disponible sur des sites d'analyse comme DefiLlama) et sa TVL actuelle.", "Déterminez précisément quelle part de ce revenu, si elle existe, revient directement aux détenteurs du token de gouvernance (fee switch actif, staking rémunéré, buyback-and-burn).", "Calculez un ratio simple : revenu capté par les détenteurs de token / market cap du token. Comparez ce ratio à celui d'un autre protocole de votre choix et commentez l'écart."]}, "cles": ["Le revenu d'un protocole DeFi provient de frais réels liés à son activité, mais rien ne garantit que ce revenu profite au détenteur du token de gouvernance.", "La TVL mesure l'ampleur de l'activité et de la confiance, pas la capture de valeur par le token — les deux notions doivent être distinguées systématiquement.", "Le fee switch et le buyback-and-burn sont deux mécanismes concrets pour relier revenus du protocole et valeur du token, chacun avec ses implications réglementaires propres.", "Comparer deux protocoles nécessite d'examiner précisément quelle part de leur activité économique revient réellement au détenteur du token, pas seulement le volume d'activité affiché."], "quiz": [{"q": "Que mesure principalement la Total Value Locked (TVL) d'un protocole DeFi ?", "options": ["La capture de valeur directe pour le token de gouvernance", "L'ampleur de l'activité et de la confiance dans le protocole", "Le prix futur garanti du token", "Le nombre exact de détenteurs du token"], "correct": 1, "explain": "Une TVL élevée est un signal positif d'adoption, mais elle ne dit rien en elle-même sur la capacité du token à capter une part de la valeur générée."}, {"q": "Un « fee switch » désigne...", "options": ["Un mécanisme pour désactiver tous les frais du protocole", "Un mécanisme permettant de rediriger une partie des frais vers les détenteurs du token de gouvernance", "Un simple outil de communication marketing", "Une fonctionnalité de vote quadratique"], "correct": 1, "explain": "L'activation d'un fee switch redirige une part des frais générés par le protocole vers les détenteurs de token, souvent via distribution ou buyback-and-burn."}, {"q": "Le mécanisme de buyback-and-burn consiste à...", "options": ["Distribuer directement les revenus à chaque détenteur", "Racheter le token sur le marché ouvert avec les revenus puis le détruire", "Émettre en continu de nouveaux tokens", "Bloquer tous les retraits des utilisateurs"], "correct": 1, "explain": "Ce mécanisme réduit l'offre en circulation sans distribuer un revenu identifiable à chaque détenteur, ce qui peut présenter des avantages réglementaires."}]}]}, {"title": "Tokenomics pour Startups et Entreprises", "sub": "Lever des fonds, construire une communauté, rester conforme", "numero": "M05", "intro": "Ce module s'adresse directement aux porteurs de projet : comment lever des fonds via un token, comment construire une communauté d'utilisateurs réels plutôt qu'une communauté purement spéculative, et comment naviguer le paysage réglementaire sans mettre le projet en péril.", "chapters": [{"n": 13, "title": "Lever des Fonds avec un Token", "objectifs": ["Distinguer ICO, IEO et IDO et comprendre pourquoi le marché est passé de l'un à l'autre.", "Évaluer les avantages et risques de chaque méthode pour un porteur de projet.", "Intégrer les considérations réglementaires de base dans le choix d'une méthode de levée de fonds."], "cours": [{"type": "h3", "text": "ICO : l'ère de la vente directe au public (2016-2018)"}, {"type": "p", "text": "Une Initial Coin Offering consiste à vendre directement des tokens au public via un site web du projet lui-même, sans intermédiaire, en échange de cryptomonnaies établies (Bitcoin, Ethereum) ou de monnaie fiduciaire. Ce modèle a permis à des milliers de projets de lever des fonds rapidement entre 2016 et 2018, mais l'absence quasi totale de vérification préalable a aussi permis l'émergence d'un nombre considérable de projets frauduleux ou simplement inaboutis, provoquant des pertes massives pour des investisseurs peu informés et attirant l'attention sévère des régulateurs, notamment la SEC américaine."}, {"type": "h3", "text": "IEO : l'exchange comme garant de sérieux"}, {"type": "p", "text": "Une Initial Exchange Offering délègue l'organisation de la vente à une plateforme d'échange établie (Binance Launchpad étant l'exemple le plus connu), qui réalise une forme de diligence raisonnable avant d'accepter de lister le projet sur sa plateforme de vente. Pour l'investisseur, cela offre une garantie de sérieux minimale (même imparfaite) apportée par la réputation de l'exchange ; pour le projet, cela apporte un accès direct à la base d'utilisateurs déjà existante de l'exchange, au prix d'une commission et d'une perte de contrôle sur le processus de vente."}, {"type": "h3", "text": "IDO : la décentralisation du processus de levée de fonds"}, {"type": "p", "text": "Une Initial DEX Offering organise la vente directement sur un exchange décentralisé ou un launchpad décentralisé, sans intermédiaire centralisé — souvent via des mécanismes qui garantissent une distribution plus équitable (allocation plafonnée par participant, mécanismes de loterie, vente à prix croissant pour limiter l'avantage des bots automatisés). Ce modèle s'est développé en réaction aux critiques adressées aux IEO (frais élevés, favoritisme perçu envers certains investisseurs), mais reste exposé au même risque de base que l'ICO : l'absence d'un tiers de confiance qui effectue une vérification préalable du sérieux du projet."}, {"type": "h3", "text": "Les launchpads : un rôle de curation devenu central"}, {"type": "p", "text": "Que ce soit sous forme d'IEO ou d'IDO, les launchpads (plateformes spécialisées dans le lancement de nouveaux tokens) jouent aujourd'hui un rôle de curation essentiel dans l'industrie : ils examinent l'équipe, l'audit de sécurité du smart contract, la structure de tokenomics, avant d'accepter de promouvoir un projet auprès de leur communauté. Pour un porteur de projet, être accepté sur un launchpad reconnu constitue en soi un signal de crédibilité qui facilite ensuite la levée de fonds et l'adoption ultérieure."}, {"type": "h3", "text": "Considérations réglementaires dans le choix de la méthode"}, {"type": "p", "text": "Quelle que soit la méthode choisie, un porteur de projet sérieux doit se poser la question du chapitre 15 avant même de lancer sa vente : le token proposé risque-t-il d'être qualifié de security token dans les principales juridictions visées ? Une vente structurée pour des utilisateurs identifiés dans des juridictions à risque réglementaire élevé (notamment les résidents américains, sous la juridiction stricte de la SEC) sans les protections juridiques adéquates (exemptions, structuration en SAFT — Simple Agreement for Future Tokens) expose le projet à des poursuites potentiellement postérieures de plusieurs années, même après un lancement en apparence réussi."}], "casEtude": {"titre": "D'une ICO à une IDO : l'évolution d'un même marché", "texte": ["De nombreux projets emblématiques de l'ère 2017 (dont Ethereum lui-même, qui a réalisé sa levée de fonds initiale via une forme d'ICO en 2014) ont utilisé un modèle de vente directe au public, sans intermédiaire ni vérification tierce préalable — un modèle qui a permis un accès rapide au capital mais aussi, pour de nombreux projets moins sérieux de la même période, favorisé des pertes considérables pour des investisseurs mal informés.", "À partir de 2019, la vague d'IEO sur Binance Launchpad a marqué un tournant : les projets acceptés (comme BitTorrent Token ou Fetch.ai) bénéficiaient d'une vérification préalable par l'exchange et d'un accès immédiat à des millions d'utilisateurs déjà inscrits, au prix d'une sélection beaucoup plus stricte des projets acceptés.", "Depuis 2021, la montée des launchpads décentralisés (comme Polkastarter ou DAO Maker) a permis un retour à un processus plus ouvert, tout en conservant certains mécanismes de protection (allocations plafonnées, vérification d'identité minimale) hérités des leçons de l'ère ICO.", "Cette évolution illustre une tension permanente dans l'industrie entre ouverture maximale (accès à tous, moins de barrières) et protection des investisseurs (vérification préalable, accès limité) — un arbitrage que chaque nouvelle génération de mécanismes de levée de fonds tente de résoudre différemment."]}, "exercice": {"consigne": "Vous êtes fondateur d'une startup fictive qui développe un protocole de paiement transfrontalier et souhaitez lever 2 millions de dollars via la vente d'un token. Élaborez votre plan de levée de fonds :", "etapes": ["Choisissez entre ICO, IEO et IDO pour votre levée, en justifiant votre choix en tenant compte de votre budget marketing, de votre notoriété actuelle et de votre tolérance au risque réglementaire.", "Identifiez les 3 juridictions dans lesquelles vous excluriez volontairement les investisseurs de votre vente publique, et expliquez pourquoi.", "Décrivez en 4-5 phrases le mécanisme anti-bot ou anti-baleine (whale) que vous mettriez en place pour garantir une distribution plus équitable entre petits investisseurs."]}, "cles": ["L'ICO (vente directe, sans intermédiaire) a cédé la place à l'IEO (vérification par un exchange) puis à l'IDO (décentralisée mais avec des protections héritées).", "Les launchpads jouent aujourd'hui un rôle de curation qui constitue en soi un signal de crédibilité pour les investisseurs.", "Le choix d'une méthode de levée de fonds doit intégrer dès le départ le risque de qualification en security token dans les principales juridictions visées.", "Chaque méthode arbitre différemment entre ouverture maximale du processus et protection des investisseurs."], "quiz": [{"q": "Une ICO (Initial Coin Offering) se caractérise par...", "options": ["Une vérification stricte réalisée par un exchange", "Une vente directe au public via le site du projet, sans intermédiaire", "Une organisation exclusivement décentralisée et sans risque", "L'absence totale d'attention réglementaire"], "correct": 1, "explain": "L'ICO permet une vente directe au public sans intermédiaire ni vérification préalable, ce qui a aussi favorisé l'émergence de nombreux projets frauduleux."}, {"q": "Par rapport à l'ICO, l'IEO ajoute principalement...", "options": ["Une diligence raisonnable réalisée par la plateforme d'échange", "La suppression totale des frais de vente", "Une garantie légale absolue contre tout risque", "Rien de différent"], "correct": 0, "explain": "L'IEO délègue l'organisation de la vente à un exchange établi qui effectue une forme de vérification préalable avant d'accepter de lister le projet."}, {"q": "Un SAFT (Simple Agreement for Future Tokens) sert principalement à...", "options": ["Éviter toute forme de réglementation", "Structurer juridiquement les ventes privées d'un token", "Remplacer entièrement le mécanisme de vesting", "Garantir un prix fixe et éternel au token"], "correct": 1, "explain": "Le SAFT est un instrument juridique utilisé pour structurer les ventes privées et réduire le risque réglementaire lié à la qualification en security token."}]}, {"n": 14, "title": "Construire une Communauté Forte", "objectifs": ["Distinguer une communauté d'utilisateurs réels d'une communauté purement spéculative.", "Concevoir des programmes d'ambassadeurs et des airdrops qui récompensent l'engagement réel.", "Identifier et limiter le phénomène de « airdrop farming » (chasse aux airdrops sans engagement réel)."], "cours": [{"type": "h3", "text": "Deux types de communautés, deux dynamiques opposées"}, {"type": "p", "text": "Une communauté d'utilisateurs réels s'engage avec le produit indépendamment du prix du token : elle utilise le service, contribue au code ou au contenu, aide de nouveaux venus. Une communauté purement spéculative s'intéresse presque exclusivement à l'évolution du prix, se mobilise en période de hausse et disparaît en période de baisse ou dès qu'un projet concurrent propose une opportunité plus attractive. La plupart des projets, en réalité, contiennent un mélange des deux — l'enjeu de conception est de maximiser la proportion d'utilisateurs réels dans les mécanismes d'incitation mis en place, plutôt que d'attirer indifféremment les deux profils."}, {"type": "h3", "text": "Les airdrops : récompenser rétroactivement plutôt qu'annoncer à l'avance"}, {"type": "p", "text": "Un airdrop distribue gratuitement des tokens à un ensemble d'utilisateurs, généralement pour récompenser une utilisation antérieure du produit avant même l'existence du token (une pratique dite « rétroactive », popularisée par Uniswap en 2020 puis par de nombreux protocoles DeFi). L'avantage majeur de l'airdrop rétroactif — non annoncé à l'avance — est qu'il élimine mécaniquement l'incitation à fabriquer artificiellement de l'activité en anticipation d'une récompense connue, puisque personne ne peut savoir avec certitude qu'un airdrop aura lieu, ni selon quels critères précis."}, {"type": "h3", "text": "Le programme d'ambassadeurs : professionnaliser l'engagement communautaire"}, {"type": "p", "text": "Un programme d'ambassadeurs identifie et rémunère (en tokens, en accès privilégiés, ou en reconnaissance formelle) les membres les plus engagés de la communauté qui contribuent activement à la croissance du projet — modération de communauté, création de contenu éducatif, traduction, support aux nouveaux utilisateurs. Ce mécanisme permet de professionnaliser une partie de l'engagement communautaire sans pour autant recréer une hiérarchie centralisée classique, à condition que les critères de sélection et de rémunération restent transparents et perçus comme équitables par l'ensemble de la communauté."}, {"type": "h3", "text": "Le fléau du airdrop farming"}, {"type": "p", "text": "Dès qu'un airdrop devient anticipé par le marché (rumeurs, patterns observés sur des projets similaires), une part croissante d'utilisateurs se met à fabriquer artificiellement de l'activité qualifiante — créer de multiples portefeuilles (« Sybil attack »), réaliser des transactions minimales sans intérêt réel pour le produit, uniquement dans l'espoir de maximiser leur allocation d'airdrop futur. Ce phénomène, largement documenté sur de nombreux airdrops majeurs de 2023-2024, dilue la valeur de la récompense pour les utilisateurs réellement engagés et peut représenter une part très significative (parfois la majorité) des portefeuilles éligibles à un airdrop mal conçu."}, {"type": "h3", "text": "Concevoir un airdrop résistant au farming"}, {"type": "p", "text": "Les meilleures pratiques actuelles combinent plusieurs signaux difficiles à fabriquer artificiellement en masse : ancienneté du portefeuille (antérieure à toute rumeur d'airdrop), diversité réelle des interactions avec le protocole plutôt qu'une simple répétition d'une action minimale, détection algorithmique de clusters de portefeuilles présentant des comportements suspicieusement similaires (financés depuis une même source, transactions synchronisées), et vesting partiel de l'airdrop lui-même pour décourager la revente immédiate en masse dès réception."}], "casEtude": {"titre": "Un airdrop massif et ses leçons pour la conception future", "texte": ["Plusieurs airdrops majeurs de protocoles DeFi et Layer 2 en 2023-2024 ont distribué des tokens à plusieurs centaines de milliers de portefeuilles, sur la base de critères d'activité passée sur le protocole (volume tradé, nombre de transactions, ancienneté d'utilisation).", "L'analyse post-airdrop de plusieurs de ces distributions a révélé qu'une part significative des portefeuilles éligibles présentait des signatures comportementales typiques du farming organisé : transactions minimales répétées à intervalles réguliers, sans lien avec un usage réel de la plateforme, et financement initial des portefeuilles provenant d'un nombre restreint de sources communes — un signal classique de Sybil attack coordonnée.", "Certains projets ont réagi en excluant a posteriori les portefeuilles identifiés comme faisant partie de tels clusters, une décision qui a suscité des débats intenses au sein de leur communauté sur l'équité et la transparence des critères appliqués rétroactivement.", "La leçon principale pour la conception de futurs airdrops : plus les critères d'éligibilité sont simples et mécaniques (un seuil de nombre de transactions, par exemple), plus ils sont facilement reproductibles à grande échelle par des farmers organisés — d'où l'intérêt croissant pour des critères qualitatifs et multi-dimensionnels, plus coûteux à simuler artificiellement."]}, "exercice": {"consigne": "Concevez un plan de croissance communautaire sur 6 mois pour un protocole DeFi fictif qui vient de lancer son produit, avant même l'émission de son token :", "etapes": ["Définissez 3 comportements d'usage réel que vous souhaitez encourager (par exemple : diversité des types de transactions, ancienneté d'utilisation, contribution au support communautaire) et pour chacun, un indicateur mesurable on-chain ou off-chain.", "Décrivez la structure d'un programme d'ambassadeurs : critères de sélection, nombre de places, type de rémunération.", "Proposez 3 mesures anti-farming concrètes que vous intégreriez dans la conception d'un futur airdrop rétroactif, en expliquant pourquoi chacune limite spécifiquement le comportement de Sybil attack."]}, "cles": ["Une communauté d'utilisateurs réels s'engage indépendamment du prix du token ; une communauté spéculative se mobilise et disparaît avec les fluctuations de prix.", "L'airdrop rétroactif (non annoncé à l'avance) élimine mécaniquement l'incitation à fabriquer artificiellement de l'activité en anticipation d'une récompense connue.", "Le airdrop farming (notamment via des attaques Sybil) peut représenter une part très significative des portefeuilles éligibles à un airdrop mal conçu.", "Les critères d'éligibilité qualitatifs et multi-dimensionnels sont plus coûteux à simuler pour un farmer organisé que des critères simples et mécaniques."], "quiz": [{"q": "Quel est l'avantage principal d'un airdrop rétroactif (non annoncé à l'avance) ?", "options": ["Il est toujours annoncé longtemps en amont", "Il élimine mécaniquement l'incitation à fabriquer artificiellement de l'activité", "Il garantit l'absence totale de farming", "Il est systématiquement gratuit sans aucune condition"], "correct": 1, "explain": "Comme personne ne peut savoir avec certitude qu'un airdrop aura lieu ni selon quels critères, l'incitation à fabriquer de l'activité en anticipation est mécaniquement réduite."}, {"q": "Le « airdrop farming » repose le plus souvent sur...", "options": ["Des utilisateurs réellement engagés dans le produit", "Des attaques Sybil via de multiples portefeuilles fabriquant de l'activité artificielle", "Un vote formel de gouvernance", "Un mécanisme de burn automatique"], "correct": 1, "explain": "Le farming implique souvent la création de multiples portefeuilles et des transactions minimales répétées, sans intérêt réel pour le produit."}, {"q": "Un programme d'ambassadeurs a pour objectif de...", "options": ["Centraliser totalement la gouvernance du projet", "Professionnaliser et récompenser l'engagement des membres les plus actifs de la communauté", "Remplacer intégralement la gouvernance décentralisée", "Supprimer tout calendrier de vesting"], "correct": 1, "explain": "Ce mécanisme rémunère les membres les plus engagés (modération, contenu, traduction, support) sans recréer une hiérarchie centralisée classique."}]}, {"n": 15, "title": "Tokenomics et Régulation", "objectifs": ["Comprendre le Howey Test et son rôle central dans la qualification d'un token en security.", "Connaître les grandes lignes du cadre réglementaire américain (SEC) et européen (MiCA).", "Établir une checklist de conformité de base pour un lancement de token."], "cours": [{"type": "h3", "text": "Le Howey Test : le cœur de la régulation américaine"}, {"type": "p", "text": "Issu d'une décision de la Cour suprême des États-Unis de 1946 (SEC v. W.J. Howey Co.), ce test qualifie un « contrat d'investissement » — donc un security au sens de la loi américaine — selon quatre critères cumulatifs : (1) un investissement d'argent, (2) dans une entreprise commune, (3) avec une attente raisonnable de profit, (4) dérivée des efforts d'un tiers (l'équipe du projet). La SEC applique ce test à de nombreux tokens vendus lors de levées de fonds, considérant que même un token présenté comme « utilitaire » peut être qualifié de security si sa vente initiale répond à ces quatre critères — l'usage ultérieur du token, une fois le réseau pleinement décentralisé et fonctionnel, pouvant en théorie faire évoluer cette qualification dans le temps."}, {"type": "h3", "text": "Les conséquences pratiques d'une qualification en security token"}, {"type": "p", "text": "Si un token est qualifié de security, sa vente et sa négociation sont soumises aux mêmes règles strictes que n'importe quelle action ou obligation traditionnelle : enregistrement auprès du régulateur (ou recours à une exemption spécifique), restrictions sur la revente, obligations de transparence financière continue. De nombreux projets ont fait l'objet d'actions d'application de la SEC pour avoir vendu des tokens non enregistrés qualifiés a posteriori de securities, entraînant des amendes substantielles et, dans certains cas, l'obligation de rembourser les investisseurs."}, {"type": "h3", "text": "MiCA : le cadre européen harmonisé"}, {"type": "p", "text": "Le règlement européen MiCA (Markets in Crypto-Assets), entré en application progressive à partir de 2024, établit un cadre harmonisé pour l'ensemble de l'Union européenne, distinguant plusieurs catégories de crypto-actifs (dont les jetons de monnaie électronique et les jetons référencés à des actifs, avec des exigences spécifiques pour les stablecoins) et imposant des obligations de transparence, de gouvernance et de capital minimum aux émetteurs. Contrairement à l'approche américaine, largement construite par la jurisprudence et l'application au cas par cas, MiCA offre un cadre législatif écrit et prévisible par avance — un avantage significatif pour les porteurs de projet en matière de sécurité juridique, au prix d'obligations de conformité plus lourdes dès le lancement."}, {"type": "h3", "text": "KYC et AML : des obligations désormais quasi universelles"}, {"type": "p", "text": "Au-delà de la qualification du token lui-même, la quasi-totalité des juridictions développées imposent aux plateformes d'échange et, de plus en plus, aux projets organisant une vente publique, des obligations de connaissance du client (Know Your Customer) et de lutte contre le blanchiment d'argent (Anti-Money Laundering) — vérification d'identité, origine des fonds, surveillance des transactions suspectes. Un projet qui ignore ces obligations s'expose non seulement à des sanctions réglementaires, mais aussi à l'exclusion de facto des principales plateformes d'échange respectant ces standards, ce qui limite considérablement la liquidité accessible à son token."}, {"type": "h3", "text": "Construire une checklist de conformité dès la conception"}, {"type": "p", "text": "Un porteur de projet sérieux intègre les questions réglementaires dès la phase de conception de la tokenomics, et non après coup : documenter précisément l'utilité fonctionnelle du token (au-delà du simple narratif d'investissement), consulter un conseil juridique spécialisé avant toute vente publique, structurer les ventes privées via des instruments juridiques adaptés (SAFT), exclure explicitement certaines juridictions à risque si la structure de vente ne peut s'y conformer, et documenter le degré de décentralisation effective du réseau à chaque étape de son développement."}], "casEtude": {"titre": "Une action réglementaire et ses répercussions sur l'industrie", "texte": ["La SEC a engagé, entre 2022 et 2024, plusieurs actions d'application majeures contre des plateformes d'échange et des émetteurs de tokens, alléguant que de nombreux tokens négociés sur ces plateformes constituaient des securities non enregistrés au regard du Howey Test.", "Ces actions ont eu un effet dissuasif immédiat sur une partie de l'industrie américaine : plusieurs plateformes ont retiré de leur catalogue les tokens visés par ces procédures, par prudence, avant même toute décision définitive des tribunaux, réduisant significativement la liquidité disponible pour ces tokens sur le marché américain.", "En parallèle, l'entrée en application de MiCA en Europe a créé un contraste réglementaire notable : plusieurs projets ont choisi de structurer une partie significative de leurs opérations et de leur base d'utilisateurs vers des juridictions européennes offrant un cadre plus prévisible, illustrant comment la réglementation devient elle-même un facteur stratégique dans la conception d'une tokenomics et le choix des marchés cibles.", "La leçon pour tout porteur de projet : la qualification réglementaire d'un token n'est jamais figée définitivement au lancement et peut évoluer avec la jurisprudence, ce qui justifie une approche prudente et documentée dès la conception plutôt qu'une réaction après coup."]}, "exercice": {"consigne": "Vous préparez le lancement d'un token utilitaire pour une plateforme de stockage décentralisé. Construisez une checklist de conformité de base :", "etapes": ["Appliquez les quatre critères du Howey Test à votre projet fictif et déterminez, avec vos propres arguments, si votre vente initiale présente un risque élevé, moyen ou faible d'être qualifiée de security.", "Listez 3 mesures concrètes que vous prendriez pour réduire ce risque (par exemple : structuration juridique de la vente, exclusion de certaines juridictions, documentation de l'utilité fonctionnelle).", "Indiquez si vous cibleriez prioritairement le marché américain ou le marché européen (sous MiCA) pour votre lancement initial, et justifiez ce choix en 3-4 phrases."]}, "cles": ["Le Howey Test qualifie un token de security selon quatre critères cumulatifs : investissement d'argent, entreprise commune, attente de profit, dérivée des efforts d'un tiers.", "MiCA offre un cadre législatif écrit et harmonisé au niveau européen, contrairement à l'approche américaine construite largement par la jurisprudence au cas par cas.", "Les obligations KYC/AML sont devenues quasi universelles et conditionnent l'accès aux principales plateformes d'échange, donc à la liquidité.", "La conformité réglementaire doit être intégrée dès la conception de la tokenomics, pas traitée comme une réflexion après coup."], "quiz": [{"q": "Le Howey Test permet de qualifier juridiquement...", "options": ["Un utility token classique", "Un security token (contrat d'investissement)", "Un NFT unique", "Un stablecoin adossé à des réserves"], "correct": 1, "explain": "Issu d'une décision de la Cour suprême américaine de 1946, ce test qualifie un contrat d'investissement selon quatre critères cumulatifs, dont l'attente de profit dérivée des efforts d'un tiers."}, {"q": "MiCA (Markets in Crypto-Assets) est...", "options": ["Une loi fédérale américaine", "Un règlement européen harmonisé encadrant les crypto-actifs", "Un protocole DeFi spécifique", "Un mécanisme de vote de gouvernance"], "correct": 1, "explain": "MiCA établit un cadre législatif écrit et harmonisé pour l'ensemble de l'Union européenne, contrairement à l'approche américaine construite par la jurisprudence."}, {"q": "Les obligations KYC/AML concernent principalement...", "options": ["Uniquement les tokens qualifiés de security", "La vérification d'identité et la lutte contre le blanchiment d'argent", "Le calcul du calendrier de vesting", "La formule de calcul de la market cap"], "correct": 1, "explain": "Ces obligations, devenues quasi universelles, imposent la vérification d'identité, l'origine des fonds et la surveillance des transactions suspectes."}]}]}, {"title": "Expert Tokenomics Designer", "sub": "Méthodologie complète, atelier final, audit", "numero": "M06", "intro": "Ce dernier module réunit l'ensemble des connaissances acquises dans une méthodologie professionnelle complète, un atelier pratique de conception d'une tokenomics de bout en bout, et une grille d'audit permettant de détecter les faiblesses structurelles d'un projet existant, à la lumière des grands échecs de l'industrie.", "chapters": [{"n": 16, "title": "Méthodologie Professionnelle", "objectifs": ["Maîtriser un processus de conception de tokenomics en sept étapes, applicable à n'importe quel projet.", "Savoir déterminer, dès la première étape, si un token est réellement nécessaire.", "Appliquer cette méthodologie à un exemple concret."], "cours": [{"type": "h3", "text": "Étape 1 : identifier le problème d'incitation à résoudre"}, {"type": "p", "text": "Avant toute chose, un tokenomics designer professionnel formule explicitement le problème d'incitation que le token est censé résoudre : coordonner des validateurs pour sécuriser un réseau, récompenser une contribution de contenu, aligner l'intérêt de multiples parties prenantes sur un objectif commun. Cette étape se conclut par une question radicale mais nécessaire : ce problème pourrait-il être résolu aussi bien, voire mieux, sans émettre de token du tout — par un système de points internes, un abonnement classique, ou une simple monnaie fiduciaire ? Un token n'a de valeur ajoutée réelle que lorsque sa transférabilité, sa négociabilité sur un marché ouvert, ou sa composabilité avec d'autres protocoles apportent un avantage concret que ces alternatives ne peuvent offrir."}, {"type": "h3", "text": "Étape 2 : définir précisément l'utilité du token"}, {"type": "p", "text": "Une fois la nécessité du token confirmée, cette étape établit sa ou ses fonctions précises (paiement, accès, récompense, gouvernance — voir chapitre 7), en évitant l'écueil classique de multiplier les utilités superficielles pour justifier artificiellement le narratif marketing du projet plutôt que de servir un besoin réel des utilisateurs."}, {"type": "h3", "text": "Étape 3 : concevoir l'offre et le calendrier d'émission"}, {"type": "p", "text": "Cette étape détermine le max supply (ou l'absence de plafond, si justifiée), le rythme d'émission dans le temps, et les éventuels mécanismes de destruction (burn) — en s'assurant systématiquement que ce modèle reste soutenable au regard d'une projection réaliste de la croissance de la demande organique, et non d'un scénario optimiste non vérifié."}, {"type": "h3", "text": "Étape 4 : structurer la distribution et le vesting"}, {"type": "p", "text": "Cette étape répartit l'offre totale entre les différentes parties prenantes (investisseurs, équipe, trésorerie, communauté) et attache à chaque allocation un calendrier de vesting cohérent avec le rôle et l'horizon d'engagement attendu de chaque catégorie, en anticipant dès cette étape les dates de déblocage à risque plutôt que de les découvrir après le lancement."}, {"type": "h3", "text": "Étape 5 : concevoir la gouvernance"}, {"type": "p", "text": "Cette étape détermine quelles décisions seront soumises au vote de la communauté, selon quel mécanisme (on-chain, off-chain, quadratique), avec quel quorum, et quelles décisions resteront, au moins temporairement, sous la responsabilité d'une équipe exécutive — en étant transparent sur cet arbitrage plutôt que de prétendre à une décentralisation totale dès le premier jour, ce qui est rarement crédible ni souhaitable pour un projet jeune."}, {"type": "h3", "text": "Étape 6 : concevoir la capture de valeur"}, {"type": "p", "text": "Cette étape détermine explicitement comment, et si, la valeur générée par l'activité du projet (frais, revenus) reviendra aux détenteurs du token — via un mécanisme direct (fee switch, staking rémunéré) ou indirect (buyback-and-burn) — en évitant de laisser cette question implicite ou non résolue, comme l'illustre le débat persistant autour du fee switch d'Uniswap étudié au chapitre 12."}, {"type": "h3", "text": "Étape 7 : tester la soutenabilité avant le lancement"}, {"type": "p", "text": "La dernière étape consiste à simuler, sur papier ou via un modèle financier simple, plusieurs scénarios (croissance forte, croissance faible, stagnation) de l'équation offre/demande sur 2 à 5 ans, en identifiant systématiquement les dates de risque (déblocages massifs de vesting, fin de programmes d'incitation initiaux) et en préparant des réponses anticipées à ces risques plutôt que de les découvrir a posteriori — une discipline qui distingue un tokenomics designer professionnel d'une conception improvisée."}], "casEtude": {"titre": "Appliquer la méthodologie à une fintech de paiement transfrontalier", "texte": ["Étape 1 : le problème identifié est la nécessité de coordonner un réseau de fournisseurs de liquidité locaux dans différents pays pour permettre des transferts d'argent rapides et peu coûteux. Conclusion : un token apporte une valeur réelle ici, car il permet de récompenser ces fournisseurs de liquidité de façon transférable et négociable sur un marché ouvert, contrairement à un simple système de points internes.", "Étape 2 : l'utilité principale retenue est le paiement de frais réduits pour les utilisateurs qui détiennent le token, combinée à une récompense pour les fournisseurs de liquidité qui facilitent les transferts.", "Étape 3 : un max supply fixé à 1 milliard de tokens, avec une émission décroissante sur 8 ans pour financer les récompenses des fournisseurs de liquidité, combinée à un burn partiel des frais de transaction pour limiter la dilution à long terme.", "Étapes 4 à 7 : une distribution avec 20 % équipe (vesting 4 ans, cliff 1 an), 15 % investisseurs (vesting 3 ans, cliff 6 mois), 40 % récompenses fournisseurs de liquidité (décroissant sur 5 ans), 25 % trésorerie et communauté ; une gouvernance progressive débutant par un contrôle majoritaire de l'équipe fondatrice sur les paramètres critiques, avec un transfert progressif vers une DAO complète sur 3 ans ; une capture de valeur via un burn automatique de 20 % des frais de transaction ; et une simulation montrant un point de tension identifié au mois 13 (fin du cliff équipe et investisseurs simultanément), pour lequel une communication proactive est déjà planifiée."]}, "exercice": {"consigne": "Appliquez les sept étapes de la méthodologie à un projet de votre choix (réel ou fictif) de votre secteur d'intérêt (santé, éducation, immobilier, logistique...) :", "etapes": ["Rédigez une réponse concise (2-3 phrases) pour chacune des sept étapes.", "Portez une attention particulière à l'étape 1 : justifiez explicitement pourquoi un token est nécessaire plutôt qu'une alternative plus simple.", "Identifiez, à l'étape 7, au moins un point de tension prévisible dans les 18 premiers mois et proposez une mesure d'anticipation."]}, "cles": ["La méthodologie professionnelle suit sept étapes : problème d'incitation, utilité, offre/émission, distribution/vesting, gouvernance, capture de valeur, test de soutenabilité.", "La première étape doit toujours inclure la question radicale : un token est-il réellement nécessaire, ou une alternative plus simple suffirait-elle ?", "Chaque étape doit être documentée explicitement plutôt que laissée implicite, en particulier la capture de valeur et la gouvernance.", "Tester la soutenabilité avant le lancement permet d'anticiper les points de tension plutôt que de les découvrir après coup."], "quiz": [{"q": "Quelle est la première étape de la méthodologie professionnelle présentée dans ce chapitre ?", "options": ["Fixer immédiatement le prix du token", "Identifier le problème d'incitation et se demander si un token est réellement nécessaire", "Choisir un exchange pour la cotation", "Rédiger uniquement le discours marketing"], "correct": 1, "explain": "Avant toute chose, il faut formuler le problème d'incitation à résoudre et se demander si un token est réellement le meilleur outil, ou si une alternative plus simple suffirait."}, {"q": "Combien d'étapes comporte la méthodologie professionnelle décrite dans ce chapitre ?", "options": ["3 étapes", "5 étapes", "7 étapes", "10 étapes"], "correct": 2, "explain": "La méthodologie complète suit sept étapes, du problème d'incitation jusqu'au test de soutenabilité avant lancement."}, {"q": "La dernière étape, tester la soutenabilité, sert principalement à...", "options": ["Fixer définitivement et immuablement le prix du token", "Simuler plusieurs scénarios et anticiper les points de tension avant le lancement", "Remplacer complètement la gouvernance prévue", "Éviter tout audit ultérieur"], "correct": 1, "explain": "Cette étape simule différents scénarios de croissance sur 2 à 5 ans pour identifier les dates de risque et préparer des réponses anticipées."}]}, {"n": 17, "title": "Création d'une Tokenomics Complète", "objectifs": ["Mettre en pratique l'ensemble des connaissances du programme dans un atelier de conception complet.", "Produire un document de tokenomics structuré et présentable, comparable à ceux utilisés par de vrais projets.", "S'exercer à défendre et justifier ses choix de conception face à des questions critiques."], "cours": [{"type": "h3", "text": "Le format d'un document de tokenomics professionnel"}, {"type": "p", "text": "Un document de tokenomics destiné à des investisseurs, des partenaires ou une communauté suit généralement une structure standardisée : résumé exécutif (le problème résolu et la solution en quelques phrases), présentation du token et de son utilité, structure d'offre et d'émission avec graphiques, tableau et graphique de distribution, calendrier de vesting détaillé, mécanisme de gouvernance, mécanisme de capture de valeur, et enfin une section d'analyse de risques qui anticipe honnêtement les limites du modèle plutôt que de les dissimuler — cette dernière section, souvent absente des documents marketing, est pourtant celle qui inspire le plus confiance à un analyste ou investisseur expérimenté."}, {"type": "h3", "text": "Quatre scénarios pour l'atelier pratique"}, {"type": "p", "text": "Pour cet atelier, choisissez l'un des quatre scénarios suivants, ou adaptez-en un à votre propre secteur d'intérêt : (A) une plateforme de paiement pour marchands en Afrique de l'Ouest cherchant à réduire les frais de transaction transfrontaliers ; (B) une marketplace mettant en relation créateurs de contenu indépendants et clients, cherchant à réduire sa dépendance aux plateformes centralisées existantes ; (C) un jeu Web3 de stratégie multijoueur cherchant à éviter les écueils du play-to-earn étudiés au chapitre 11 ; (D) une DAO de financement participatif pour des projets à impact social, cherchant une gouvernance transparente et robuste."}, {"type": "h3", "text": "Anticiper les questions critiques"}, {"type": "p", "text": "Un exercice essentiel pour tout tokenomics designer est de se préparer aux questions les plus dures qu'un investisseur ou un journaliste spécialisé pourrait poser : « Pourquoi ce projet a-t-il besoin d'un token plutôt que d'un simple système de points ? », « Que se passe-t-il pour le prix du token le jour où le plus gros bloc de vesting se débloque ? », « Quelle part des revenus du protocole revient réellement aux détenteurs de token, concrètement, en dollars ? », « Ce token risque-t-il d'être qualifié de security dans sa juridiction principale ? ». Un designer capable de répondre avec précision et honnêteté à ces questions, plutôt que de les esquiver par un discours marketing vague, construit une crédibilité durable auprès de sa communauté et de ses partenaires financiers."}, {"type": "h3", "text": "L'importance de la cohérence d'ensemble"}, {"type": "p", "text": "Le piège le plus fréquent d'un exercice de conception complète est l'incohérence entre les différentes sections : une utilité de paiement quotidien mal alignée avec une politique de vesting qui incite plutôt à la détention long terme, ou une gouvernance présentée comme totalement décentralisée alors que la distribution laisse 60 % de l'offre entre les mains de l'équipe et des investisseurs. Un document de tokenomics de qualité professionnelle est relu spécifiquement pour vérifier cette cohérence transversale entre toutes ses sections, pas seulement la qualité de chaque section prise isolément."}], "casEtude": {"titre": "Extrait commenté d'un document de tokenomics pour le scénario B (marketplace de créateurs)", "texte": ["Résumé exécutif : la plateforme connecte directement créateurs indépendants et clients, en réduisant la commission prélevée par rapport aux plateformes centralisées existantes (souvent 20 à 30 %) à environ 5 %, financée par un token utilitaire servant à la fois de moyen de paiement et de mécanisme de réduction de commission pour les détenteurs actifs.", "Distribution : 12 % équipe (vesting 4 ans, cliff 1 an), 8 % investisseurs early-stage (vesting 2 ans, cliff 6 mois), 15 % trésorerie, 65 % communauté et incentives — répartis entre récompenses pour les créateurs actifs (30 %), programme d'ambassadeurs (5 %) et réserve de liquidité initiale (30 %). Cette répartition largement orientée communauté (65 %) est cohérente avec le positionnement du projet comme alternative pro-créateurs face aux plateformes centralisées.", "Analyse de risques (section souvent omise mais ici incluse) : le risque principal identifié est la dépendance initiale à un nombre limité de créateurs fondateurs pour amorcer l'effet de réseau ; ce risque est atténué par un programme d'incitation ciblé sur les 500 premiers créateurs actifs plutôt que par une distribution uniforme à tous les utilisateurs, afin de concentrer l'effort d'amorçage là où il compte le plus."]}, "exercice": {"consigne": "Choisissez l'un des quatre scénarios proposés (ou adaptez-en un à votre secteur) et rédigez un document de tokenomics complet :", "etapes": ["Rédigez un résumé exécutif de 3-4 phrases présentant le problème résolu et la solution.", "Détaillez l'utilité du token, la structure d'offre et d'émission, la distribution et le calendrier de vesting, la gouvernance, et le mécanisme de capture de valeur — en vous appuyant sur les sept étapes du chapitre 16.", "Rédigez une section d'analyse de risques honnête identifiant au moins 2 faiblesses réelles de votre conception et les mesures d'atténuation envisagées.", "Préparez des réponses écrites aux 4 questions critiques listées dans ce chapitre, appliquées à votre propre projet."]}, "cles": ["Un document de tokenomics professionnel inclut systématiquement une section d'analyse de risques honnête, souvent absente des documents purement marketing.", "Se préparer aux questions critiques les plus dures (nécessité du token, impact du vesting, capture de valeur réelle, risque réglementaire) construit une crédibilité durable.", "La cohérence transversale entre les sections (utilité, distribution, gouvernance, capture de valeur) est aussi importante que la qualité de chaque section isolément.", "Un exercice de conception complète doit être relu spécifiquement pour détecter les incohérences entre les choix faits à chaque étape."], "quiz": [{"q": "Quelle section, souvent absente des documents marketing, est pourtant jugée essentielle dans ce chapitre ?", "options": ["Le résumé exécutif", "Une analyse de risques honnête", "Le logo du projet", "La liste des exchanges partenaires"], "correct": 1, "explain": "Une section d'analyse de risques qui anticipe honnêtement les limites du modèle est celle qui inspire le plus confiance à un analyste expérimenté."}, {"q": "Quel est le piège le plus fréquent d'un exercice de conception complète de tokenomics ?", "options": ["Un vesting jugé trop long", "Une incohérence entre les différentes sections du document (utilité, distribution, gouvernance...)", "Une distribution trop généreuse envers la communauté", "Une gouvernance présentée comme trop transparente"], "correct": 1, "explain": "L'incohérence transversale entre sections — par exemple une gouvernance présentée comme décentralisée alors que la distribution reste très concentrée — est le piège le plus fréquent."}, {"q": "Laquelle de ces questions fait partie des questions ics ?", "options": ["Prix, volume, marketing, logo", "Émission non soutenable, incitations désalignées, concentration excessive, absence d'utilité réelle", "Vitesse, sécurité, décentralisation, coût de transaction", "Nom du fondateur, siège social, date de création, nombre d'employés"], "correct": 1, "explain": "Ces quatre familles synthétisent l'ensemble du programme et permettent de détecter les faiblesses structurelles d'une tokenomics existante."}, {"q": "L'effondrement d'UST et Luna en mai 2022 a notamment été déclenché par...", "options": ["Un piratage majeur du protocole", "Des retraits massifs liés à un rendement de 20 % non soutenable sur Anchor", "Une nouvelle réglementation soudaine", "Un simple bug mineur de smart contract"], "correct": 1, "explain": "Le rendement de 20 % offert par Anchor était un signal classique d'émission non soutenable, et sa remise en question a déclenché une sortie de capitaux massive."}, {"q": "Un rendement anormalement élevé sur un protocole est généralement interprété comme...", "options": ["Un signe de solidité exceptionnelle du projet", "Un signal d'alerte sur la soutenabilité de l'émission", "Une preuve de décentralisation totale", "Un indicateur neutre sans signification"], "correct": 1, "explain": "Un rendement anormalement élevé (comme les 20 % d'Anchor) est systématiquement un signal d'alerte qu'il faut vérifier avant d'investir."}]}]}];

// Flatten chapters for prev/next navigation
const FLAT = [];
DATA.forEach((mod, mi) => {
  mod.chapters.forEach((c, ci) => FLAT.push({ mi, ci, mod, chap: c }));
});

let completed = new Set(); // chapitres réellement terminés (quiz réussi, ou pas de quiz)
let current = null; // {mi, ci} or null = cover

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

function esc(s){
  return s;
}

function renderSupplyBar(){
  const bar = document.getElementById('supply-bar');
  bar.innerHTML = '';
  FLAT.forEach((f, idx) => {
    const seg = document.createElement('div');
    seg.className = 'supply-seg';
    if (completed.has(idx)) seg.className += ' visited';
    if (current && f.mi === current.mi && f.ci === current.ci) seg.className += ' current';
    bar.appendChild(seg);
  });
  document.getElementById('supply-count').textContent = completed.size + ' / ' + FLAT.length;
}

function renderTOC(){
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  DATA.forEach((mod, mi) => {
    const modDiv = document.createElement('div');
    modDiv.className = 'toc-module';
    if (current && current.mi === mi) modDiv.className += ' open';

    const head = document.createElement('div');
    head.className = 'toc-module-head';
    head.innerHTML = '<span class="toc-module-num">' + mod.numero + '</span>' +
      '<span class="toc-module-title">' + mod.title + '</span>' +
      '<span class="toc-module-arrow">▶</span>';
    head.onclick = () => { modDiv.classList.toggle('open'); };
    modDiv.appendChild(head);

    const chapsDiv = document.createElement('div');
    chapsDiv.className = 'toc-chapters';
    mod.chapters.forEach((c, ci) => {
      const flatIdx = FLAT.findIndex(f => f.mi===mi && f.ci===ci);
      const item = document.createElement('div');
      item.className = 'toc-chapter';
      if (completed.has(flatIdx)) item.className += ' visited';
      if (current && current.mi===mi && current.ci===ci) item.className += ' active';
      item.innerHTML = '<span class="dot"></span><span class="n">' + String(c.n).padStart(2,'0') + '</span><span>' + c.title + '</span>';
      item.onclick = () => { goTo(mi, ci); if(window.innerWidth<=880) document.getElementById('sidebar').classList.remove('open'); };
      chapsDiv.appendChild(item);
    });
    modDiv.appendChild(chapsDiv);
    toc.appendChild(modDiv);
  });
}

function renderCover(){
  current = null;
  const page = document.getElementById('page');
  let cards = '';
  DATA.forEach((mod, mi) => {
    const chapList = mod.chapters.map(c => (mi+1) + '.' + c.n.toString().padStart(2,'0').slice(-1) + ' — ' + c.title).join('<br>');
    cards += '<div class="cover-card" onclick="goTo('+mi+',0)">' +
      '<div class="cover-card-num">' + mod.numero + '</div>' +
      '<div class="cover-card-title">' + mod.title + '</div>' +
      '<div class="cover-card-chaps">' + mod.chapters.map(c=>'Ch. '+c.n+' — '+c.title).join('<br>') + '</div>' +
      '</div>';
  });
  page.innerHTML =
    '<p class="cover-eyebrow">Formation complète · 18 chapitres</p>' +
    '<h1 class="cover-title">Tokenomics<br>Masterclass</h1>' +
    '<p class="cover-lede">Des fondamentaux de la blockchain jusqu&rsquo;à la conception et l&rsquo;audit complet d&rsquo;une économie de token — une méthodologie professionnelle en 6 modules, illustrée par des cas réels et ponctuée d&rsquo;exercices pratiques.</p>' +
    '<button class="cover-start-btn" onclick="goTo(0,0)">Commencer le chapitre 1 →</button>' +
    '<div class="cover-rule"></div>' +
    '<div class="cover-grid">' + cards + '</div>';
  renderTOC();
  renderSupplyBar();
  window.scrollTo(0,0);
}

function chapterHTML(mi, ci){
  const mod = DATA[mi];
  const c = mod.chapters[ci];
  const serial = 'N° ' + String(c.n).padStart(3,'0');

  let cours = '';
  c.cours.forEach(b => {
    if (b.type === 'h3') cours += '<h3 class="sub">' + b.text + '</h3>';
    else cours += '<p class="body-p">' + b.text + '</p>';
  });

  let quizHTML = '';
  if (c.quiz && c.quiz.length){
    const letters = ['A','B','C','D'];
    let qBlocks = '';
    c.quiz.forEach((q, qi) => {
      let optsHTML = '';
      q.options.forEach((opt, oi) => {
        optsHTML += '<div class="quiz-opt" data-qi="'+qi+'" data-oi="'+oi+'" onclick="selectQuizOpt('+qi+','+oi+')">' +
          '<span class="letter">'+letters[oi]+'</span><span>'+opt+'</span></div>';
      });
      qBlocks +=
        '<div class="quiz-q" data-qidx="'+qi+'">' +
        '<p class="quiz-q-text">'+(qi+1)+'. '+q.q+'</p>' +
        '<div class="quiz-options">'+optsHTML+'</div>' +
        '<div class="quiz-explain" id="quiz-explain-'+qi+'"><b>Explication —</b> '+q.explain+'</div>' +
        '</div>';
    });
    quizHTML =
      '<div class="box box-quiz">' +
        '<p class="box-label">Quiz du chapitre</p>' +
        '<p class="quiz-intro">Testez votre compréhension avant de passer au chapitre suivant.</p>' +
        qBlocks +
        '<div class="quiz-actions">' +
          '<button class="quiz-check-btn" id="quiz-check-btn" onclick="checkQuiz()">Vérifier mes réponses</button>' +
          '<span class="quiz-score" id="quiz-score"></span>' +
        '</div>' +
      '</div>';
  }

  const objectifs = c.objectifs.map(o => '<li>'+o+'</li>').join('');
  const casTexte = c.casEtude.texte.map(p => '<p>'+p+'</p>').join('');
  const etapes = c.exercice.etapes.map(e => '<li>'+e+'</li>').join('');
  const cles = c.cles.map(k => '<li>'+k+'</li>').join('');

  const flatIdx = FLAT.findIndex(f => f.mi===mi && f.ci===ci);
  const prev = FLAT[flatIdx-1];
  const next = FLAT[flatIdx+1];

  const prevBtn = prev
    ? '<button class="nav-btn prev" onclick="goTo('+prev.mi+','+prev.ci+')"><span class="lbl">← Précédent</span><span class="ttl">Ch. '+prev.chap.n+' — '+prev.chap.title+'</span></button>'
    : '<button class="nav-btn prev" disabled><span class="lbl">← Précédent</span><span class="ttl">Début du cours</span></button>';
  const nextBtn = next
    ? '<button class="nav-btn next" onclick="goTo('+next.mi+','+next.ci+')"><span class="lbl">Suivant →</span><span class="ttl">Ch. '+next.chap.n+' — '+next.chap.title+'</span></button>'
    : '<button class="nav-btn next" disabled><span class="lbl">Suivant →</span><span class="ttl">Fin du programme 🎓</span></button>';

  return (
    '<div class="chap-eyebrow"><span>' + mod.numero + ' · ' + mod.title + '</span><span class="chap-serial">' + serial + '</span></div>' +
    '<h1 class="chap-title">Chapitre ' + c.n + ' — ' + c.title + '</h1>' +
    '<div class="box box-objectifs"><p class="box-label">Objectifs du chapitre</p><ul class="plain">' + objectifs + '</ul></div>' +
    '<h2 class="section-h2">Cours</h2><div class="section-rule"></div>' +
    cours +
    '<div class="box box-case"><p class="box-label">Étude de cas — ' + c.casEtude.titre + '</p>' + casTexte + '</div>' +
    '<div class="box box-exercise"><p class="box-label">Exercice pratique</p><p class="instructions">' + c.exercice.consigne + '</p><ol class="steps">' + etapes + '</ol></div>' +
    '<div class="box box-keys"><p class="box-label">Points clés à retenir</p><ul class="keys">' + cles + '</ul></div>' +
    quizHTML +
    '<div class="chap-nav">' + prevBtn + nextBtn + '</div>'
  );
}

let quizAnswers = {};
let quizChecked = false;

function selectQuizOpt(qi, oi){
  if (quizChecked) return;
  quizAnswers[qi] = oi;
  const q = document.querySelector('.quiz-q[data-qidx="'+qi+'"]');
  q.querySelectorAll('.quiz-opt').forEach(el => {
    el.classList.toggle('selected', parseInt(el.dataset.oi,10) === oi);
  });
}

function checkQuiz(){
  const mod = DATA[current.mi];
  const c = mod.chapters[current.ci];
  const quiz = c.quiz || [];
  const flatIdx = FLAT.findIndex(f => f.mi===current.mi && f.ci===current.ci);

  // Empêche la vérification tant que toutes les questions n'ont pas reçu de réponse
  const unanswered = quiz.some((q, qi) => quizAnswers[qi] === undefined);
  if (unanswered){
    const scoreEl = document.getElementById('quiz-score');
    if (scoreEl){
      scoreEl.classList.add('warning');
      scoreEl.textContent = 'Merci de répondre à toutes les questions avant de vérifier.';
    }
    return;
  }

  let score = 0;
  quiz.forEach((q, qi) => {
    const qDiv = document.querySelector('.quiz-q[data-qidx="'+qi+'"]');
    const chosen = quizAnswers[qi];
    if (chosen === q.correct) score++;
    qDiv.querySelectorAll('.quiz-opt').forEach(el => {
      const oi = parseInt(el.dataset.oi,10);
      el.onclick = null;
      el.style.cursor = 'default';
      if (oi === q.correct) el.classList.add('correct');
      else if (oi === chosen) el.classList.add('incorrect');
    });
    const explainEl = document.getElementById('quiz-explain-'+qi);
    if (explainEl) explainEl.classList.add('show');
  });
  quizChecked = true;
  const btn = document.getElementById('quiz-check-btn');
  if (btn) btn.disabled = true;
  const scoreEl = document.getElementById('quiz-score');
  if (scoreEl){
    scoreEl.classList.remove('warning');
    scoreEl.innerHTML = 'Score : <b>' + score + ' / ' + quiz.length + '</b>';
  }

  if (score === quiz.length){
    // Chapitre validé : le quiz est parfaitement réussi
    completed.add(flatIdx);
  } else {
    // Score imparfait : proposer de repasser le quiz
    const actions = document.querySelector('.quiz-actions');
    if (actions && !document.getElementById('quiz-retry-btn')){
      const retryBtn = document.createElement('button');
      retryBtn.id = 'quiz-retry-btn';
      retryBtn.className = 'quiz-retry-btn';
      retryBtn.textContent = 'Repasser le quiz';
      retryBtn.onclick = retryQuiz;
      actions.appendChild(retryBtn);
    }
  }
  renderTOC();
  renderSupplyBar();
}

function retryQuiz(){
  quizAnswers = {};
  quizChecked = false;
  document.getElementById('page').innerHTML = chapterHTML(current.mi, current.ci);
}

function goTo(mi, ci){
  current = { mi, ci };
  const flatIdx = FLAT.findIndex(f => f.mi===mi && f.ci===ci);
  const chap = FLAT[flatIdx].chap;
  // Un chapitre sans quiz est considéré terminé dès sa lecture ;
  // un chapitre avec quiz ne compte comme terminé que si le quiz a été réussi (voir checkQuiz).
  if (!chap.quiz || !chap.quiz.length){
    completed.add(flatIdx);
  }
  quizAnswers = {};
  quizChecked = false;
  document.getElementById('page').innerHTML = chapterHTML(mi, ci);
  renderTOC();
  renderSupplyBar();
  window.scrollTo(0,0);
}

renderCover();
</script>
